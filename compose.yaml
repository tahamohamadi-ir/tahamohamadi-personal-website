services:
  postgres:
    image: postgres:17-alpine
    profiles: [qa]
    environment:
      POSTGRES_DB: ${TAHA_QA_POSTGRES_DB:-taha_qa}
      POSTGRES_USER: ${TAHA_QA_POSTGRES_USER:-taha_qa}
      POSTGRES_PASSWORD: ${TAHA_QA_POSTGRES_PASSWORD:-taha_qa_local_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: ./backend
    profiles: [qa]
    environment:
      SPRING_PROFILES_ACTIVE: local,qa
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${TAHA_QA_POSTGRES_DB:-taha_qa}
      DB_USERNAME: ${TAHA_QA_POSTGRES_USER:-taha_qa}
      DB_PASSWORD: ${TAHA_QA_POSTGRES_PASSWORD:-taha_qa_local_password}
      TAHA_BACKEND_PORT: 8080
      TAHA_QA_ADMIN_EMAIL: ${TAHA_QA_ADMIN_EMAIL:?TAHA_QA_ADMIN_EMAIL is required for QA}
      TAHA_QA_ADMIN_PASSWORD: ${TAHA_QA_ADMIN_PASSWORD:?TAHA_QA_ADMIN_PASSWORD is required for QA}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    profiles: [qa]
    environment:
      TAHA_BACKEND_ORIGIN: http://backend:8080
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    profiles: [qa]
    ports:
      - "${TAHA_PUBLIC_PORT:-8088}:8080"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres_data:
    name: ${TAHA_QA_POSTGRES_VOLUME:-taha_qa_postgres_data}
