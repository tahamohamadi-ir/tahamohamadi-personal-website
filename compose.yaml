services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taha_site}
      POSTGRES_USER: ${POSTGRES_USER:-taha_site}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taha_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME:-taha_postgres_data}
