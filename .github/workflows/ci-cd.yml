name: CI and Production CD

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven verification
        working-directory: backend
        run: mvn -B -ntp verify

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test:unit

      - name: Build frontend SSR application
        working-directory: frontend
        run: npm run build

  infrastructure:
    name: Infrastructure validation
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Validate deployment scripts
        run: |
          bash -n scripts/deploy/taha-deploy
          bash -n scripts/deploy/taha-deploy-watch
          bash -n scripts/deploy/install-server.sh

      - name: Validate production Compose configuration
        run: |
          cat > /tmp/taha-ci.env <<'ENV'
          PROD_POSTGRES_DB=taha_ci
          PROD_POSTGRES_USER=taha_ci
          PROD_POSTGRES_PASSWORD=ci-only-placeholder
          PROD_ADMIN_BOOTSTRAP_ENABLED=false
          PROD_ADMIN_EMAIL=
          PROD_ADMIN_PASSWORD=
          ENV

          docker compose \
            --env-file /tmp/taha-ci.env \
            -f compose.production.yaml \
            config \
            --quiet

          rm -f /tmp/taha-ci.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Validate backend Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend-ci
          cache-to: type=gha,mode=max,scope=backend-ci

      - name: Validate frontend Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./frontend
          push: false
          cache-from: type=gha,scope=frontend-ci
          cache-to: type=gha,mode=max,scope=frontend-ci

  publish:
    name: Publish container images
    needs:
      - backend
      - frontend
      - infrastructure

    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: ghcr.io/tahamohamadi-ir/tahamohamadi-personal-website-backend

          - service: frontend
            context: ./frontend
            image: ghcr.io/tahamohamadi-ir/tahamohamadi-personal-website-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Authenticate to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish ${{ matrix.service }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=tahamohamadi-personal-website-${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}-publish
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-publish

  approve-production:
    name: Approve production deployment
    needs:
      - publish

    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: write

    environment:
      name: production
      url: https://tahamohamadi.ir

    concurrency:
      group: production-deployment
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Create immutable production approval tag
        env:
          TARGET_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main

          git merge-base \
            --is-ancestor \
            "$TARGET_SHA" \
            origin/main

          TAG_NAME="production-${RUN_NUMBER}-${RUN_ATTEMPT}-${TARGET_SHA}"

          git tag \
            "$TAG_NAME" \
            "$TARGET_SHA"

          git push \
            origin \
            "$TAG_NAME"

          echo "Approved production tag: $TAG_NAME"

      - name: Wait for exact Production version
        env:
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail

          for ATTEMPT in $(seq 1 90); do
            DEPLOYED_SHA="$(
              curl \
                --fail \
                --silent \
                --show-error \
                --connect-timeout 10 \
                --max-time 20 \
                --header 'Cache-Control: no-cache' \
                "https://tahamohamadi.ir/deployment-version?attempt=${ATTEMPT}&target=${TARGET_SHA}" \
              2>/dev/null \
              | tr -d '[:space:]' \
              || true
            )"

            printf \
              'Attempt %02d/90 deployed=%s target=%s\n' \
              "$ATTEMPT" \
              "${DEPLOYED_SHA:-unavailable}" \
              "$TARGET_SHA"

            if [ "$DEPLOYED_SHA" = "$TARGET_SHA" ]; then
              echo "Exact Production version verified."
              exit 0
            fi

            sleep 10
          done

          echo "Production did not report the expected commit in time."
          exit 1

      - name: Verify public Production endpoints
        run: |
          set -Eeuo pipefail

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            https://tahamohamadi.ir/healthz \
            --output /dev/null

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            https://tahamohamadi.ir/fa \
            --output /dev/null

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            https://tahamohamadi.ir/en \
            --output /dev/null

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 5 \
            --retry-all-errors \
            https://tahamohamadi.ir/api/v1/public/fa/home \
            --output /dev/null
