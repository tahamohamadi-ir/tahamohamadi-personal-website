spring:
  application:
    name: tahamohamadi-backend
  servlet:
    multipart:
      # Media policy: images are capped at 10 MiB and PDFs at 20 MiB.
      # The request cap reserves 1 MiB for multipart framing and metadata.
      max-file-size: 20971520B
      max-request-size: 22020096B

taha:
  security:
    bcrypt-strength: ${TAHA_AUTH_BCRYPT_STRENGTH:12}
    secure-cookies: true
  media:
    storage:
      root: ${TAHA_MEDIA_STORAGE_ROOT:./var/media}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db

server:
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
        secure: ${taha.security.secure-cookies}
        path: /
