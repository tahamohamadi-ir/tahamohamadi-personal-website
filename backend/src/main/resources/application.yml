spring:
  application:
    name: tahamohamadi-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${TAHA_DB_URL:jdbc:postgresql://localhost:5432/taha_site}
    username: ${TAHA_DB_USERNAME:taha_site}
    password: ${TAHA_DB_PASSWORD:taha_site}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${TAHA_BACKEND_PORT:8080}
