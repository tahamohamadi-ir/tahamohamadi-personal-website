spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taha_site}
    username: ${DB_USERNAME:taha_site}
    password: ${DB_PASSWORD:taha_local_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

taha:
  security:
    secure-cookies: false

server:
  port: ${TAHA_BACKEND_PORT:8080}
